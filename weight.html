<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <title>Image Sequence Touch</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: red; }
    * { box-sizing: border-box; }
    canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const FIRST = 650600;
  const LAST  = 650624;
  const TOTAL = LAST - FIRST + 1;
  const FWD_FPS = 10;
  const REV_FPS = 90;
  const FADE_IN_MS  = 200;
  const FADE_OUT_MS = (TOTAL / REV_FPS) * 1000;
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    render();
  }
  window.addEventListener('resize', resize);
  const frames = new Array(TOTAL);
  let loaded = 0;
  let ready = false;
  for (let i = 0; i < TOTAL; i++) {
    const img = new Image();
    img.src = `weight_img/IMG_${FIRST + i}.webp`;
    img.onload = img.onerror = () => {
      if (++loaded === TOTAL) { ready = true; render(); }
    };
    frames[i] = img;
  }
  let frameIndex = 0;
  let alpha = 0;
  let seqTimer = null;
  let fadeRAF = null;
  let holding = false;
  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (alpha > 0 && ready) {
      ctx.globalAlpha = alpha;
      ctx.drawImage(frames[frameIndex], 0, 0, canvas.width, canvas.height);
      ctx.globalAlpha = 1;
    }
  }
  function stopSeq() {
    if (seqTimer) { clearInterval(seqTimer); seqTimer = null; }
  }
  function stopFade() {
    if (fadeRAF) { cancelAnimationFrame(fadeRAF); fadeRAF = null; }
  }
  function fadeTo(target, durationMs, onDone) {
    stopFade();
    const start = performance.now();
    const from = alpha;
    function step(now) {
      const t = Math.min((now - start) / durationMs, 1);
      alpha = from + (target - from) * t;
      render();
      if (t < 1) { fadeRAF = requestAnimationFrame(step); }
      else { alpha = target; render(); if (onDone) onDone(); }
    }
    fadeRAF = requestAnimationFrame(step);
  }
  function onDown() {
    if (holding) return;
    holding = true;
    stopSeq();
    stopFade();
    frameIndex = 0;
    render();
    fadeTo(1, FADE_IN_MS);
    seqTimer = setInterval(() => {
      if (frameIndex < TOTAL - 1) { frameIndex++; render(); }
      else stopSeq();
    }, 1000 / FWD_FPS);
  }
  function onUp() {
    if (!holding) return;
    holding = false;
    stopSeq();
    seqTimer = setInterval(() => {
      if (frameIndex > 0) { frameIndex--; render(); }
      else { stopSeq(); }
    }, 1000 / REV_FPS);
    fadeTo(0, FADE_OUT_MS);
  }
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.addEventListener('touchstart',  e => { e.preventDefault(); onDown(); }, { passive: false });
  document.addEventListener('touchend',    e => { e.preventDefault(); onUp();   }, { passive: false });
  document.addEventListener('touchcancel', e => { e.preventDefault(); onUp();   }, { passive: false });
</script>
</body>
</html>
